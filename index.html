const catLabels = { lodge: 'Lodging', dine: 'Dining', act: 'Activity' };
const catOrder = ['lodge', 'dine', 'act'];

function getItemsForStop(stopId) {
  return items.filter(it => it.stop === stopId);
}

function getActiveVariant(item) {
  return item[choices[item.id]];
}

function buildPopup(stop) {
  if (stop.fixedPopup) return stop.fixedPopup;
  let html = stop.popupHeader || '';
  if (stop.popupLodge) html += stop.popupLodge;
  const stopItems = getItemsForStop(stop.id).filter(it => !it.locked);
  catOrder.forEach(cat => {
    const catItems = stopItems.filter(it => it.cat === cat);
    catItems.forEach(it => {
      const v = getActiveVariant(it);
      if (v.popup) {
        const mode = choices[it.id];
        const tagColor = mode === 'budget' ? '#4a8c3f' : '#b8860b';
        const tagLabel = it.same ? '' : ` <span style="background:${tagColor};color:white;font-size:0.68em;padding:1px 5px;border-radius:3px;font-weight:600;">${mode === 'budget' ? 'B' : 'S'}</span>`;
        html += `<div class="popup-section"><div class="sec-title ${cat}">${catLabels[cat] || ''}${tagLabel}</div>${v.popup}</div>`;
      }
    });
  });
  if (stop.popupExtra) html += stop.popupExtra;
  return html;
}

function createIcon(type) {
  const colors = { start:'#2c2520', end:'#2c2520', overnight:'#b8860b', stop:'#7a6e63', cannes:'#c4a035' };
  const sizes = { start:12, end:12, overnight:14, stop:10, cannes:18 };
  const c = colors[type]||'#b8860b', sz = sizes[type]||12;
  return L.divIcon({ className:'', html:`<div style="width:${sz}px;height:${sz}px;background:${c};border:2.5px solid white;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,0.3);"></div>`, iconSize:[sz,sz], iconAnchor:[sz/2,sz/2], popupAnchor:[0,-sz/2-4] });
}

const markers = {};
stopMeta.forEach(s => {
  if (s.id === 'amsterdam-end') { markers[s.id] = markers['amsterdam-start']; return; }
  const marker = L.marker([s.lat, s.lng], { icon: createIcon(s.type) })
    .addTo(map).bindPopup(buildPopup(s), { maxWidth: 340, minWidth: 260 });
  markers[s.id] = marker;
});

function refreshPopups() {
  stopMeta.forEach(s => {
    if (s.id === 'amsterdam-end') return;
    markers[s.id].setPopupContent(buildPopup(s));
  });
}

function flyToStop(stop) {
  document.querySelectorAll('.stop-header').forEach(c => c.classList.remove('active'));
  const el = document.getElementById('hdr-' + stop.id);
  if (el) el.classList.add('active');
  const tid = stop.id === 'amsterdam-end' ? 'amsterdam-start' : stop.id;
  map.flyTo([stop.lat, stop.lng], stop.type === 'cannes' ? 12 : 10, { duration: 1 });
  setTimeout(() => markers[tid].openPopup(), 600);
}

// BUDGET CALCULATION
function calcTotal() {
  let low = 0, high = 0;
  items.forEach(it => {
    const v = getActiveVariant(it);
    low += v.costLow;
    high += v.costHigh;
  });
  return { low, high };
}

// SIDEBAR BUILD
function buildSidebar() {
  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = '';
  let currentPhase = '';

  stopMeta.forEach(s => {
    if (s.phase !== currentPhase) {
      currentPhase = s.phase;
      const label = document.createElement('div');
      label.className = 'phase-label';
      label.textContent = s.phase === 'south' ? 'Southbound to Cannes' : s.phase === 'cannes' ? 'Festival' : 'Northbound to Amsterdam';
      sidebar.appendChild(label);
    }
    const section = document.createElement('div');
    section.className = 'stop-section';

    // Header
    const hdr = document.createElement('div');
    hdr.className = 'stop-header';
    hdr.id = 'hdr-' + s.id;
    const driveHtml = s.drive ? `<div class="drive-tag">&#x1F697; ${s.drive}</div>` : '';
    hdr.innerHTML = `<div class="header-left"><div class="day">${s.day}</div><div class="name">${s.name}</div>${driveHtml}</div>`;
    hdr.addEventListener('click', () => flyToStop(s));
    section.appendChild(hdr);

    // Items
    const stopItems = getItemsForStop(s.id);
    if (stopItems.length > 0) {
      const list = document.createElement('div');
      list.className = 'item-list';
      stopItems.forEach(it => {
        const v = getActiveVariant(it);
        const row = document.createElement('div');
        row.className = 'item-row' + (it.locked ? ' locked' : '');

        const catCls = it.cat === 'transport' ? '' : it.cat;
        let toggleHtml = '';
        if (it.locked) {
          toggleHtml = '<span class="locked-tag">LOCKED</span>';
        } else if (it.same) {
          toggleHtml = '<span class="same-tag">Same</span>';
        } else {
          const bSel = choices[it.id] === 'budget' ? ' sel-budget' : '';
          const sSel = choices[it.id] === 'splurge' ? ' sel-splurge' : '';
          toggleHtml = `<div class="item-toggle"><button class="${bSel}" data-id="${it.id}" data-mode="budget" onclick="toggleItem('${it.id}','budget')">B</button><button class="${sSel}" data-id="${it.id}" data-mode="splurge" onclick="toggleItem('${it.id}','splurge')">S</button></div>`;
        }

        row.innerHTML = `
          <div class="item-info">
            <div class="item-cat ${catCls}">${catLabels[it.cat] || 'Transport'}</div>
            <div class="item-name">${v.name}</div>
            <div class="item-price">${v.price}</div>
          </div>
          ${toggleHtml}
        `;
        list.appendChild(row);
      });
      section.appendChild(list);
    }
    sidebar.appendChild(section);
  });

  // Budget panel
  buildBudgetPanel(sidebar);
}

function buildBudgetPanel(sidebar) {
  const total = calcTotal();
  const panel = document.createElement('div');

  // Build rows grouped by category
  const cats = [
    { label: 'Lodging', ids: items.filter(i => i.cat === 'lodge').map(i => i.id) },
    { label: 'Dining', ids: items.filter(i => i.cat === 'dine').map(i => i.id) },
    { label: 'Activities', ids: items.filter(i => i.cat === 'act').map(i => i.id) },
    { label: 'Transport', ids: items.filter(i => i.cat === 'transport').map(i => i.id) }
  ];

  let rowsHtml = '';
  cats.forEach(cat => {
    rowsHtml += `<div class="budget-row cat-row"><span class="label">${cat.label}</span><span class="amount"></span></div>`;
    cat.ids.forEach(id => {
      const it = items.find(i => i.id === id);
      const v = getActiveVariant(it);
      const mode = choices[it.id];
      let tag = '';
      if (!it.locked && !it.same) {
        tag = mode === 'budget' ? ' <span class="tag-b">B</span>' : ' <span class="tag-s">S</span>';
      }
      const amt = v.costLow === v.costHigh ? `\u20AC${v.costLow}` : `\u20AC${v.costLow} to ${v.costHigh}`;
      rowsHtml += `<div class="budget-row"><span class="label">${v.name}${tag}</span><span class="amount">${amt}</span></div>`;
    });
  });

  const totalStr = total.low === total.high ? `\u20AC${total.low.toLocaleString()}` : `\u20AC${total.low.toLocaleString()} to ${total.high.toLocaleString()}`;
  rowsHtml += `<div class="budget-row total-row"><span class="label">Estimated Total (all in)</span><span class="amount">${totalStr}</span></div>`;

  panel.innerHTML = `
    <div class="budget-panel">
      <h3>Your Trip Budget (2 people)</h3>
      ${rowsHtml}
      <div class="budget-note">All prices for 2 travellers. Drinks not included. Fuel: ~7 L/100km at ~&euro;1.80/L. Hotel prices approximate.</div>
    </div>
  `;
  sidebar.appendChild(panel);
}

function toggleItem(id, mode) {
  choices[id] = mode;
  buildSidebar();
  refreshPopups();
}

function setAllMode(mode) {
  items.forEach(it => { if (!it.locked && !it.same) choices[it.id] = mode; });
  document.querySelectorAll('.preset-btn').forEach(b => b.className = 'preset-btn');
  if (mode === 'budget') document.querySelector('.preset-btn:first-child').classList.add('budget-hl');
  else document.querySelector('.preset-btn:last-child').classList.add('splurge-hl');
  buildSidebar();
  refreshPopups();
}

// Sidebar toggle
let sidebarOpen = true;
function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  document.getElementById('sidebar').classList.toggle('collapsed');
  document.getElementById('toggleBtn').classList.toggle('collapsed');
  document.getElementById('toggleBtn').innerHTML = sidebarOpen ? '&#9664;' : '&#9654;';
}

// Init
buildSidebar();


// ========== COMMENTING SYSTEM ==========
const STORAGE_KEY = 'cannes-trip-comments';
let currentUser = 'jimi';

function loadComments() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch(e) { return {}; }
}
function saveComments(comments) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(comments));
}

function getStopComments(stopId) {
  const all = loadComments();
  return all[stopId] || [];
}

function addComment(stopId, text) {
  if (!text.trim()) return;
  const all = loadComments();
  if (!all[stopId]) all[stopId] = [];
  all[stopId].push({
    author: currentUser,
    text: text.trim(),
    time: new Date().toISOString()
  });
  saveComments(all);
  buildCommentsPanel();
}

function formatTime(iso) {
  const d = new Date(iso);
  const day = d.getDate();
  const mon = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()];
  const h = d.getHours().toString().padStart(2,'0');
  const m = d.getMinutes().toString().padStart(2,'0');
  return day + ' ' + mon + ' ' + h + ':' + m;
}

function buildCommentsPanel() {
  let panel = document.getElementById('comments-panel');
  if (!panel) {
    panel = document.createElement('div');
    panel.id = 'comments-panel';
    document.getElementById('sidebar').appendChild(panel);
  }

  const allComments = loadComments();
  const totalCount = Object.values(allComments).reduce((s, arr) => s + arr.length, 0);

  const commentStops = ['reims', 'lyon', 'valence', 'cannes', 'aix', 'beaune'];
  const stopNames = {
    reims: 'Reims', lyon: 'Lyon', valence: 'Valence',
    cannes: 'Cannes Lions', aix: 'Aix en Provence', beaune: 'Beaune'
  };

  let html = '<div class="comments-panel">';
  html += '<h3>Comments <span>' + totalCount + ' total</span></h3>';

  // User selector
  html += '<div style="padding:10px 16px 4px;">';
  html += '<div class="user-select">';
  html += '<button class="user-btn ' + (currentUser==='jimi' ? 'active-jimi' : '') + '" onclick="setUser(\'jimi\')">Jimi</button>';
  html += '<button class="user-btn ' + (currentUser==='denise' ? 'active-denise' : '') + '" onclick="setUser(\'denise\')">Denise</button>';
  html += '</div></div>';

  commentStops.forEach(sid => {
    const comments = allComments[sid] || [];
    const count = comments.length;
    html += '<div class="comment-stop-section">';
    html += '<div class="comment-stop-header" onclick="toggleCommentSection(\''+sid+'\')">';
    html += '<span>' + stopNames[sid] + '</span>';
    html += '<span class="count ' + (count === 0 ? 'zero' : '') + '">' + count + '</span>';
    html += '</div>';
    html += '<div class="comment-body" id="comments-' + sid + '">';

    comments.forEach(c => {
      html += '<div class="comment-bubble ' + c.author + '">';
      html += '<div class="author">' + c.author + '</div>';
      html += c.text;
      html += '<div class="time">' + formatTime(c.time) + '</div>';
      html += '</div>';
    });

    html += '<div class="comment-form">';
    html += '<input type="text" id="input-' + sid + '" placeholder="Add a note..." onkeydown="if(event.key===\'Enter\')addComment(\''+sid+'\',this.value)">';
    html += '<button onclick="addComment(\''+sid+'\',document.getElementById(\'input-'+sid+'\').value)">Post</button>';
    html += '</div>';
    html += '</div></div>';
  });

  html += '</div>';
  panel.innerHTML = html;
}

function toggleCommentSection(sid) {
  const el = document.getElementById('comments-' + sid);
  if (el) el.classList.toggle('open');
}

function setUser(u) {
  currentUser = u;
  buildCommentsPanel();
}

// Build comments after sidebar
setTimeout(buildCommentsPanel, 100);
